# ~/.tmux.conf
# ========== Prefix ==========
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ========== 分屏（形状即含义）==========
# 垂直分屏（左右） | 
bind | split-window -h -c "#{pane_current_path}"
# 水平分屏（上下） -
bind - split-window -v -c "#{pane_current_path}"
# 取消默认绑定（可选）
unbind '"'
unbind %

# ========== Alt + hjkl 切换 pane（vim 风格）==========
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ========== Prefix + H/J/K/L 调整大小（大写） ==========
# `-r` 表示可以**重复按**（repeatable），按一次 Prefix 后可以连续按 `H` 多次调整。
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ========== Alt + 数字 直接切换窗口（类似浏览器标签）==========
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
# Alt + n/p 切换下/上一个窗口
bind -n M-n select-window -n
bind -n M-p select-window -p

# ========== 复制模式（Vi 风格）==========
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
# Linux 剪贴板
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# ========== 其他高频 ==========
bind r source-file ~/.tmux.conf \; display "Reloaded!"
bind c new-window -c "#{pane_current_path}"
bind m resize-pane -Z
bind x confirm-before -p "kill-pane #P? (y/n)" kill-pane

# ========== 鼠标 ==========
set -g mouse on

# ========== 基础优化 ==========
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -sg escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
